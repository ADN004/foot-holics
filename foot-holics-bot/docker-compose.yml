services:
  footholics-bot:
    build:
      context: ..           # build context = foot-holics/ root (so COPY in Dockerfile works)
      dockerfile: foot-holics-bot/Dockerfile
    container_name: footholics-bot
    restart: unless-stopped

    # All secrets come from .env — never hardcode them here
    env_file: .env

    volumes:
      # Mount foot-holics/ as /app (main site + bot)
      - ..:/app
      # Mount foot-holics-live/ at /foot-holics-live so bot can find it as sibling of /app
      - ../../foot-holics-live:/foot-holics-live

    working_dir: /app

    # Forward logs to Docker (visible via `docker compose logs -f`)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

services:
  footholics-bot:
    build:
      context: ..           # build context = foot-holics/ root (so COPY in Dockerfile works)
      dockerfile: foot-holics-bot/Dockerfile
    container_name: footholics-bot
    restart: unless-stopped

    # All secrets come from .env — never hardcode them here
    env_file: .env

    volumes:
      # Mount the entire project so the bot can read/write index.html, events.json, etc.
      - ..:/app

    working_dir: /app

    # Forward logs to Docker (visible via `docker compose logs -f`)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
